<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://brinovax.com/" />
    <meta name="theme-color" content="#2258ff" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Apply the saved (or OS-preferred) theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("brinovax-theme");
          var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>

    <title>Affordable, managed website hosting for small businesses · Brinovax</title>
    <meta
      name="description"
      content="Brinovax builds fast, secure websites for small businesses and hosts them on AWS — HTTPS, a custom domain, AI-assisted edits, and honest, affordable pricing. Get a free quote."
    />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Brinovax" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://brinovax.com/" />
    <meta property="og:title" content="Fast, secure, affordable websites for small businesses · Brinovax" />
    <meta
      property="og:description"
      content="Managed website hosting on AWS — HTTPS, a custom domain, AI-assisted edits, reviewed before every launch. Get a free, no-obligation quote."
    />
    <meta property="og:image" content="https://brinovax.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Brinovax — fast, secure, affordable website hosting for small businesses" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fast, secure, affordable websites for small businesses · Brinovax" />
    <meta
      name="twitter:description"
      content="Managed website hosting on AWS — HTTPS, custom domain, AI-assisted edits, reviewed before launch. Get a free quote."
    />
    <meta name="twitter:image" content="https://brinovax.com/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Brinovax",
        "url": "https://brinovax.com/",
        "logo": "https://brinovax.com/og-image.png",
        "email": "bpbrinson@brinovax.com",
        "description": "Brinovax builds and hosts fast, secure, affordable websites for small businesses on AWS.",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Brinovax",
        "url": "https://brinovax.com/"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
        "serviceType": "Managed website design and hosting",
        "provider": { "@type": "Organization", "name": "Brinovax", "url": "https://brinovax.com/" },
        "areaServed": "US",
        "audience": { "@type": "Audience", "audienceType": "Small businesses" },
        "description": "Fast, secure websites built and hosted on AWS with HTTPS, a custom domain, previews before launch, AI-assisted edits, and affordable pricing."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How much does a Brinovax website cost?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Pricing is built for small businesses and depends on your plan and scope. Starter hosting is our most affordable tier; custom builds are quoted per project. Reach out and we'll give you an honest, plain-English quote — there's no cost to ask."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to launch?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most small-business sites go from intake to a live, approved site in a couple of weeks — it depends mostly on how quickly content and approvals come together. You review a private preview before anything goes live."
            }
          },
          {
            "@type": "Question",
            "name": "Do I own my website and domain?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. You keep ownership of your domain and content. We manage the hosting and deployment; you approve every change."
            }
          },
          {
            "@type": "Question",
            "name": "Can I make changes after it launches?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Absolutely. Request content edits within your plan — our AI drafts them fast, and nothing goes live until you review and approve. Every change is previewed and reversible."
            }
          },
          {
            "@type": "Question",
            "name": "Is my site secure and reliable?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Every site runs on AWS with HTTPS, private storage behind a global CDN, health checks, and documented rollback — enterprise-grade foundations without the enterprise bill."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
